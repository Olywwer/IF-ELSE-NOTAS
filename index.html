<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Escolar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header d-flex align-items-center justify-content-between px-4 shadow">

    <div class="logo">
         <strong>Centro Educacional</strong>
    </div>

    <div class="titulo">
        <h5 class="m-0">OLIVEIRA E SOUZA</h5>
        <small>Sistema de Gestão Escolar</small>
    </div>

    

</header>


<div class="d-flex">

    <div class="sidebar p-3">
        <button class="menu-btn active" onclick="ativarMenu(this); mostrarTela('cadastro')">
             Cadastro
        </button>

        <button class="menu-btn" onclick="ativarMenu(this); mostrarTela('lista')">
             Alunos
        </button>
    </div>

   
    <div class="content p-4 w-100">

       
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center shadow">
                    <h5>Total de Alunos</h5>
                    <h2 id="totalAlunos">0</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center shadow aprovado">
                    <h5>Aprovados</h5>
                    <h2 id="aprovados">0</h2>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3 text-center shadow reprovado">
                    <h5>Reprovados</h5>
                    <h2 id="reprovados">0</h2>
                </div>
            </div>
        </div>

       
        <div id="cadastro">
            <h3>Cadastrar Aluno</h3>

            <input type="text" id="nome" class="form-control mb-2" placeholder="Nome do aluno">
            <input type="number" id="n1" class="form-control mb-2" placeholder="Nota 1">
            <input type="number" id="n2" class="form-control mb-2" placeholder="Nota 2">
            <input type="number" id="n3" class="form-control mb-2" placeholder="Nota 3">

            <button class="btn btn-primary w-100" onclick="adicionarAluno()">Salvar</button>
        </div>

        
        <div id="lista" style="display:none;">
            <h3 class="mt-3">Lista de Alunos</h3>

            <table class="table table-striped mt-3">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Notas</th>
                        <th>Média</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabela"></tbody>
            </table>

            <button class="btn btn-danger" onclick="limpar()">Limpar Tudo</button>
        </div>

    </div>
</div>

<script src="scritp.js"></script>
</body>
</html>
